syntax = "proto3";
package Cratis.Chronicle.Contracts.Events;
import "google/protobuf/empty.proto";

message EventType {
   string Id = 1;
   uint32 Generation = 2;
   bool Tombstone = 3;
}
message EventTypeGenerationDefinition {
   uint32 Generation = 1;
   string Schema = 2;
}
message EventTypeMigrationDefinition {
   uint32 FromGeneration = 1;
   uint32 ToGeneration = 2;
   repeated EventTypeMigrationOperation Operations = 3;
   string UpcastJmesPath = 4;
   string DowncastJmesPath = 5;
}
message EventTypeMigrationOperation {
   string Operation = 1;
   string Details = 2;
}
message EventTypeRegistration {
   EventType Type = 1;
   string Schema = 2;
   repeated EventTypeGenerationDefinition Generations = 3;
   repeated EventTypeMigrationDefinition Migrations = 4;
}
message GetAllEventTypesRequest {
   string EventStore = 1;
}
message GetEventTypeGenerationsRequest {
   string EventStore = 1;
   string EventTypeId = 2;
}
message IEnumerable_EventType {
   repeated EventType items = 1;
}
message IEnumerable_EventTypeRegistration {
   repeated EventTypeRegistration items = 1;
}
message RegisterEventTypesRequest {
   string EventStore = 1;
   repeated EventTypeRegistration Types = 2;
   bool DisableValidation = 3;
}
message RegisterSingleEventTypeRequest {
   string EventStore = 1;
   EventTypeRegistration Type = 2;
}
service EventTypes {
   rpc GetAll (GetAllEventTypesRequest) returns (IEnumerable_EventType);
   rpc GetAllGenerationsForEventType (GetEventTypeGenerationsRequest) returns (IEnumerable_EventTypeRegistration);
   rpc GetAllRegistrations (GetAllEventTypesRequest) returns (IEnumerable_EventTypeRegistration);
   rpc ObserveAllRegistrations (GetAllEventTypesRequest) returns (stream IEnumerable_EventTypeRegistration);
   rpc Register (RegisterEventTypesRequest) returns (.google.protobuf.Empty);
   rpc RegisterSingle (RegisterSingleEventTypeRequest) returns (.google.protobuf.Empty);
}
