name: Integration Specs

on:
  workflow_call:
    inputs:
      dotnet-cache-key:
        description: "Cache key for dotnet build artifacts"
        required: true
        type: string
      chronicle-image:
        description: "Chronicle Docker image to use for out-of-process tests"
        required: true
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      client-matrix: ${{ steps.client.outputs.matrix }}
      kernel-matrix: ${{ steps.kernel.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover Client integration namespaces
        id: client
        run: |
          namespaces=""
          while IFS= read -r dir; do
            if grep -R -q '\[Fact\]' "$dir" --include='*.cs'; then
              namespaces+="$(basename "$dir")"$'\n'
            fi
          done < <(find Integration/Client -mindepth 1 -maxdepth 1 -type d ! -name 'bin' ! -name 'obj' | sort)

          namespaces=$(echo "$namespaces" | sed '/^$/d' | sort -u)

          # mode|database|needs-docker
          declare -a configs=(
            "inprocess|mongodb|false"
            "outofprocess|mongodb|true"
            "outofprocess|sqlite|true"
            "outofprocess|postgresql|true"
            "outofprocess|mssql|true"
          )

          # Namespaces that use direct server-side storage access (IStorage, IGrainFactory)
          # and are only compatible with inprocess mode.
          inprocess_only_namespaces=("for_EventStoreSubscriptions")

          # Namespaces that require MongoDB as the storage backend (use direct MongoDB APIs,
          # MongoDB-specific features like PII encryption, or kernel storage access patterns
          # that only work when the in-process silo and the Chronicle server share MongoDB).
          mongodb_only_namespaces=("for_EventSequence")

          matrix='{"include":['
          for ns in $namespaces; do
            [ -z "$ns" ] && continue
            for config in "${configs[@]}"; do
              IFS='|' read -r mode database needs_docker <<< "$config"
              # Skip outofprocess configs for namespaces that require inprocess-only infrastructure.
              if [[ "$mode" == "outofprocess" ]]; then
                skip=false
                for skip_ns in "${inprocess_only_namespaces[@]}"; do
                  [[ "$ns" == "$skip_ns" ]] && skip=true && break
                done
                $skip && continue
              fi
              # Skip non-MongoDB outofprocess configs for namespaces that require MongoDB.
              if [[ "$mode" == "outofprocess" && "$database" != "mongodb" ]]; then
                skip=false
                for skip_ns in "${mongodb_only_namespaces[@]}"; do
                  [[ "$ns" == "$skip_ns" ]] && skip=true && break
                done
                $skip && continue
              fi
              matrix+="{\"namespace\":\"Cratis.Chronicle.Integration.${ns}\",\"mode\":\"${mode}\",\"database\":\"${database}\",\"needs-docker\":${needs_docker}},"
            done
          done
          matrix="${matrix%,}]}"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Discover Kernel integration namespaces
        id: kernel
        run: |
          namespaces=$(find Integration/Kernel -mindepth 1 -maxdepth 1 -type d \
            ! -name 'bin' ! -name 'obj' \
            -exec basename {} \; | sort)

          matrix='{"include":['
          for ns in $namespaces; do
            [ -z "$ns" ] && continue
            matrix+="{\"namespace\":\"Cratis.Chronicle.Kernel.Integration.${ns}\"},"
          done
          matrix="${matrix%,}]}"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  client-integration-specs:
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.client-matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.410
            9.0.x
            10.0.x

      - name: Restore build output
        uses: actions/cache@v4
        with:
          path: ./**/bin
          key: ${{ inputs.dotnet-cache-key }}

      - name: Login to GitHub Docker Registry
        if: matrix.needs-docker == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Client project
        run: dotnet restore Integration/Client/Client.csproj

      - name: Run Client integration tests (${{ matrix.namespace }} | ${{ matrix.mode }} | ${{ matrix.database }})
        env:
          CRATIS_CHRONICLE_LOCAL_IMAGE: ${{ inputs.chronicle-image }}
          CHRONICLE_RUNTIME_MODE: ${{ matrix.mode }}
          CHRONICLE_STORAGE_PROVIDER: ${{ matrix.database }}
          CHRONICLE_TEST_TIMEOUT_SECONDS: ${{ matrix.database == 'mongodb' && '120' || '300' }}
        run: |
          dotnet test Integration/Client/Client.csproj \
            --no-restore \
            --filter "FullyQualifiedName~${{ matrix.namespace }}" \
            --logger "console;verbosity=normal" \
            --configuration Release \
            -p:DisableDockerBuild=true

  kernel-integration-specs:
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.kernel-matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.410
            9.0.x
            10.0.x

      - name: Restore build output
        uses: actions/cache@v4
        with:
          path: ./**/bin
          key: ${{ inputs.dotnet-cache-key }}

      - name: Restore Kernel project
        run: dotnet restore Integration/Kernel/Kernel.csproj

      - name: Run Kernel integration tests (${{ matrix.namespace }})
        run: |
          # Kernel project does not have Client's Docker build target.
          dotnet test Integration/Kernel/Kernel.csproj \
            --no-restore \
            --filter "FullyQualifiedName~${{ matrix.namespace }}" \
            --logger "console;verbosity=normal" \
            --configuration Release
