name: .NET Build & Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET8_VERSION: "8.0.410"
  DOTNET9_VERSION: "9.0.x"
  DOTNET_VERSION: "10.0.x"
  DOTNET_CACHE: "dotnet-cache-${{ github.sha }}"
  DOTNET_OBJ_CACHE: "dotnet-obj-cache-${{ github.sha }}"
  CRATIS_CHRONICLE_LOCAL_IMAGE: "ghcr.io/cratis/chronicle:${{ github.sha }}"
  # NuGet.config references the github-packages source with %GITHUB_TOKEN%.
  # NuGet expands that placeholder against the shell environment, not against
  # GitHub Actions secrets, so the value must be exported here so every
  # dotnet restore in this workflow can authenticate against the feed.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "**"
    paths:
      - "Source/**/*.cs"
      - "Source/**/*.csproj"
      - "Integration/**"
      - ".github/workflows/dotnet-build.yml"
      - ".github/workflows/integration.yml"

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    outputs:
      dotnet-cache-key: ${{ steps.export-cache-key.outputs.key }}
      chronicle-image: ${{ steps.export-cache-key.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', '**/Directory.*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore obj cache
        uses: actions/cache@v4
        with:
          path: ./**/obj
          key: ${{ env.DOTNET_OBJ_CACHE }}
          restore-keys: |
            dotnet-obj-cache-

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add GitHub Package Registry to NuGet
        run: |
          dotnet nuget update source github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text || \
          dotnet nuget add source --name github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text https://nuget.pkg.github.com/cratis/index.json

      - name: Build
        run: dotnet build --configuration Release -p:DisableProxyGenerator=true -p:DisableDockerBuild=true

      - name: Build and push development Docker image
        run: |
          dotnet publish Source/Kernel/Server/Server.csproj \
            --configuration Debug \
            --no-restore \
            -o Source/Kernel/Server/out
          docker build -t "${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" -f Docker/Local/Dockerfile .
          docker push ${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}

      - name: Export cache key and image
        id: export-cache-key
        run: |
          echo "key=${{ env.DOTNET_CACHE }}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" >> "$GITHUB_OUTPUT"

  specs:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Run tests
        # Integration tests are executed by .github/workflows/integration.yml.
        # Keep regular specs focused on non-integration test suites.
        run: dotnet test --no-build --configuration Release --settings specs.runsettings --filter "FullyQualifiedName!~Cratis.Chronicle.Integration&FullyQualifiedName!~Cratis.Chronicle.Kernel.Integration"

  integration:
    needs: [dotnet-build]
    uses: ./.github/workflows/integration.yml
    secrets: inherit
    with:
      dotnet-cache-key: ${{ needs.dotnet-build.outputs.dotnet-cache-key }}
      chronicle-image: ${{ needs.dotnet-build.outputs.chronicle-image }}

  integration-api:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image from cached binaries
        run: |
          rm -rf Source/Kernel/Server/out
          mkdir -p Source/Kernel/Server/out
          cp -r Source/Kernel/Server/bin/Release/net10.0/. Source/Kernel/Server/out/
          docker build -t "${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" -f Docker/Local/Dockerfile .

      - name: Run API integration tests
        working-directory: ./Integration/Api
        # Keep build enabled for .NET 10 test projects. `--no-build` causes an
        # invalid test assembly argument failure in this workflow context.
        run: dotnet test --logger "console;verbosity=normal" --configuration Release -p:DisableDockerBuild=true

  mongodb:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run MongoDB integration tests
        working-directory: ./Integration/MongoDB
        run: dotnet test --no-build --logger "console;verbosity=normal" --configuration Release
