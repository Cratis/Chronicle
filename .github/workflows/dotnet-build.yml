name: .NET Build & Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET8_VERSION: "8.0.410"
  DOTNET9_VERSION: "9.0.x"
  DOTNET_VERSION: "10.0.x"
  DOTNET_CACHE: "dotnet-cache-${{ github.sha }}"
  DOTNET_OBJ_CACHE: "dotnet-obj-cache-${{ github.sha }}"
  # Separate cache for the DEVELOPMENT-symbol build the integration tests consume.
  DOTNET_DEV_CACHE: "dotnet-dev-cache-${{ github.sha }}"
  DOTNET_DEV_OBJ_CACHE: "dotnet-dev-obj-cache-${{ github.sha }}"
  CRATIS_CHRONICLE_LOCAL_IMAGE: "ghcr.io/cratis/chronicle:${{ github.sha }}"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "**"
    paths:
      - "Source/**/*.cs"
      - "Source/**/*.csproj"
      - "Integration/**"
      - ".github/workflows/dotnet-build.yml"
      - ".github/workflows/integration.yml"

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    outputs:
      dotnet-cache-key: ${{ steps.export-cache-key.outputs.key }}
      chronicle-image: ${{ steps.export-cache-key.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', '**/Directory.*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore obj cache
        uses: actions/cache@v4
        with:
          path: ./**/obj
          key: ${{ env.DOTNET_OBJ_CACHE }}
          restore-keys: |
            dotnet-obj-cache-

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add GitHub Package Registry to NuGet
        run: |
          dotnet nuget update source github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text || \
          dotnet nuget add source --name github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text https://nuget.pkg.github.com/cratis/index.json

      - name: Build
        run: dotnet build --configuration Release -p:DisableProxyGenerator=true -p:DisableDockerBuild=true

      - name: Build and push development Docker image
        run: |
          dotnet publish Source/Kernel/Server/Server.csproj \
            --configuration Debug \
            --no-restore \
            -o Source/Kernel/Server/out
          docker build -t "${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" -f Docker/Local/Dockerfile .
          docker push ${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}

      - name: Export cache key and image
        id: export-cache-key
        run: |
          echo "key=${{ env.DOTNET_CACHE }}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" >> "$GITHUB_OUTPUT"

  # The integration tests run with the DEVELOPMENT compile symbol, which the
  # Release build above does not define, so every integration shard would
  # otherwise recompile ~15-20 projects from source before its first test.
  # Build that variant once here -- in parallel with dotnet-build, so it does
  # not extend the critical path -- and cache it under its own key for the
  # shards to restore and run with --no-build. The non-DEVELOPMENT cache stays
  # for the specs/mongodb/integration-api jobs, which must exercise production
  # (non-DEVELOPMENT) behavior.
  dotnet-build-development:
    runs-on: ubuntu-latest
    outputs:
      dotnet-cache-key: ${{ steps.export-dev-cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.*.props', '**/Directory.*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore obj cache
        uses: actions/cache@v4
        with:
          path: ./**/obj
          key: ${{ env.DOTNET_DEV_OBJ_CACHE }}
          restore-keys: |
            dotnet-dev-obj-cache-

      - uses: actions/cache@v4
        id: dotnet-dev-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_DEV_CACHE }}

      - name: Add GitHub Package Registry to NuGet
        run: |
          dotnet nuget update source github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text || \
          dotnet nuget add source --name github --username cratis --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text https://nuget.pkg.github.com/cratis/index.json

      - name: Build with DEVELOPMENT symbol
        run: dotnet build --configuration Release -p:EnableDevelopmentSymbol=true -p:DisableProxyGenerator=true -p:DisableDockerBuild=true

      - name: Export dev cache key
        id: export-dev-cache-key
        run: echo "key=${{ env.DOTNET_DEV_CACHE }}" >> "$GITHUB_OUTPUT"

  specs:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Run tests with coverage
        # Integration tests are executed by .github/workflows/integration.yml.
        # Keep regular specs focused on non-integration test suites.
        run: dotnet test --no-build --configuration Release --settings specs.runsettings --filter "FullyQualifiedName!~Cratis.Chronicle.Integration&FullyQualifiedName!~Cratis.Chronicle.Kernel.Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results-specs
          path: ./coverage-results/
          retention-days: 1

  integration:
    needs: [dotnet-build, dotnet-build-development]
    uses: ./.github/workflows/integration.yml
    secrets: inherit
    with:
      # Integration shards restore the DEVELOPMENT-symbol build and run --no-build;
      # the Docker image still comes from dotnet-build.
      dotnet-cache-key: ${{ needs.dotnet-build-development.outputs.dotnet-cache-key }}
      chronicle-image: ${{ needs.dotnet-build.outputs.chronicle-image }}

  integration-api:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image from cached binaries
        run: |
          rm -rf Source/Kernel/Server/out
          mkdir -p Source/Kernel/Server/out
          cp -r Source/Kernel/Server/bin/Release/net10.0/. Source/Kernel/Server/out/
          docker build -t "${{ env.CRATIS_CHRONICLE_LOCAL_IMAGE }}" -f Docker/Local/Dockerfile .

      - name: Run API integration tests with coverage
        working-directory: ./Integration/Api
        # Keep build enabled for .NET 10 test projects. `--no-build` causes an
        # invalid test assembly argument failure in this workflow context.
        run: dotnet test --logger "console;verbosity=normal" --configuration Release -p:DisableDockerBuild=true --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results-integration-api
          path: ./Integration/Api/coverage-results/
          retention-days: 1

  mongodb:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run MongoDB integration tests with coverage
        working-directory: ./Integration/MongoDB
        run: dotnet test --no-build --logger "console;verbosity=normal" --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results-mongodb
          path: ./Integration/MongoDB/coverage-results/
          retention-days: 1

  coverage-merge-and-cache:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    needs: [specs, integration, integration-api, mongodb]
    permissions:
      contents: write
    outputs:
      coverage-cache-key: ${{ steps.export-coverage-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-coverage-results
          # Download all coverage artifacts using wildcard pattern
          pattern: coverage-results-*

      - name: Merge coverage results
        run: |
          # Create directories for merged coverage
          mkdir -p ./coverage-results
          mkdir -p ./coverage-reports
          
          # Find all coverage.cobertura.xml files from artifacts and copy them
          find ./all-coverage-results -name "coverage.cobertura.xml" -type f | while read file; do
            echo "Found coverage file: $file"
            # Create unique directory for each coverage file
            dirname_hash=$(echo "$file" | md5sum | cut -d' ' -f1)
            mkdir -p "./coverage-results/$dirname_hash"
            cp "$file" "./coverage-results/$dirname_hash/coverage.cobertura.xml"
          done
          
          echo "Merged coverage results:"
          find ./coverage-results -name "coverage.cobertura.xml" | head -20

      - name: Install coverage tools
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate merged coverage report
        run: |
          reportgenerator \
            -reports:"./coverage-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-reports" \
            -reporttypes:"Cobertura;JsonSummary" \
            -assemblyfilters:"-*.Specs;-xunit*;-NSubstitute*"
          
          echo "Generated coverage report:"
          ls -la ./coverage-reports/

      - name: Cache merged coverage
        uses: actions/cache@v4
        with:
          path: ./coverage-reports
          key: coverage-cache-${{ github.sha }}

      - name: Export coverage cache key
        id: export-coverage-key
        run: |
          echo "key=coverage-cache-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Collect coverage statistics
        run: |
          .github/scripts/collect-coverage.sh \
            "./coverage-reports" \
            "./Documentation/statistics/coverage-data.js" \
            "${{ github.head_ref || github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message || format('Coverage update for {0}', github.head_ref || github.ref_name) }}"

      - name: Commit coverage statistics
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Documentation/statistics/coverage-data.js
          if git diff --staged --quiet; then
            echo "No coverage statistics changes to commit"
          else
            git commit -m "Update coverage statistics [skip ci]"
            branch="${{ github.head_ref || github.ref_name }}"
            git pull --rebase origin "$branch"
            git push origin HEAD:"$branch"
          fi

  benchmarks:
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    outputs:
      benchmark-cache-key: ${{ steps.export-benchmark-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        id: dotnet-x64-output
        with:
          path: ./**/bin
          key: ${{ env.DOTNET_CACHE }}

      - name: Run Benchmarks
        working-directory: ./Benchmarks/Chronicle.Benchmarks
        run: |
          dotnet build -c Release /p:TreatWarningsAsErrors=false
          dotnet run -c Release --no-build -- --filter '*' --exporters json --artifacts BenchmarkDotNet.Artifacts

      - name: Find and Copy Results
        run: |
          mkdir -p Benchmarks/results
          find Benchmarks/Chronicle.Benchmarks -path "*/BenchmarkDotNet.Artifacts/results/*.json" -type f -exec cp {} Benchmarks/results/ \;
          test -n "$(find Benchmarks/results -maxdepth 1 -name '*.json' -print -quit)" || { echo "No benchmark JSON files were produced"; exit 1; }
          ls -la Benchmarks/results/
          python3 Benchmarks/merge-results.py

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Cratis Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: Benchmarks/results/combined.json
          external-data-json-path: Documentation/benchmarks/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@einari'

      - name: Cache benchmark results
        uses: actions/cache@v4
        with:
          path: Documentation/benchmarks/benchmark-data.json
          key: benchmark-cache-${{ github.sha }}

      - name: Export benchmark cache key
        id: export-benchmark-key
        run: |
          echo "key=benchmark-cache-${{ github.sha }}" >> "$GITHUB_OUTPUT"
