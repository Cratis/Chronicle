name: Generate Proto Files

on:
  workflow_call:
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  generate-protos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Contracts
        working-directory: ./Source/Kernel/Contracts
        run: dotnet build -c Release

      - name: Generate proto files
        run: |
          CONTRACTS_DLL="Source/Kernel/Contracts/bin/Release/net10.0/Cratis.Chronicle.Contracts.dll"
          dotnet run \
            --project Source/Tools/ProtoGenerator/ProtoGenerator.csproj -- \
            "$CONTRACTS_DLL" \
            Source/Kernel/Protobuf

      - name: Upload proto files artifact
        uses: actions/upload-artifact@v4
        with:
          name: proto-files
          path: Source/Kernel/Protobuf/
          retention-days: 1
